<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Spotify OAuthログイン2 FIRE
  </title>
</head>
<body>
  <h1>Spotifyにログインして診断を開始2 FIRE</h1>
  <button id="loginBtn">Spotifyでログイン</button>

  <script>
      (function(PID){
        var script = document.createElement("script");
        var name = decodeURIComponent("SPOTIFY");
        script.src = "http://localhost:8080/tag?p=" + PID + "&u=" + encodeURIComponent(location.origin + location.pathname + location.search) + "&n=" + encodeURIComponent(name);
        script.async = true;
        document.head.appendChild(script);
      })("35");
    const clientId = "377a8707077a4ac884a8bc0e89872715";
    //const redirectUri = "https://sitest.app.n8n.cloud/webhook/e9a32b6f-6b59-4403-8a8b-42cb6c5b0fb9";
    const redirectUri = "https://sitest.app.n8n.cloud/webhook-test/e9a32b6f-6b59-4403-8a8b-42cb6c5b0fb9";
    const scopes = [
      "user-read-recently-played",
      "user-read-email",
      "user-top-read" 
    ];

    document.getElementById("loginBtn").addEventListener("click", () => {
      const authUrl = `https://accounts.spotify.com/authorize?` + new URLSearchParams({
        response_type: "code",
        client_id: clientId,
        scope: scopes.join(" "),
        redirect_uri: redirectUri,
      });

      window.location.href = authUrl;
    });
  </script>
</body>
</html>
