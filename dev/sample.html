      <div class="sticky-container">
        <h1 class="sticky-test">HTMLの基本構造</h1>
        <p>
          これは基本的なHTMLページのサンプルです。スタイルが簡単に適用されています。
        </p>

        <ul>
          <li><strong>HTML：</strong>Webページの構造を作ります</li>
          <li><strong>CSS：</strong>ページのデザインを整えます</li>
          <li>
            <strong>JavaScript：</strong
            >ページにインタラクティブな動作を追加します
          </li>
        </ul>

        <form name="userForm" action="/submit" method="POST">
          <label for="name">名前：</label><br />
          <input type="text" id="name" name="name" required /><br /><br />

          <label for="email">メールアドレス：</label><br />
          <input type="email" id="email" name="email" required /><br /><br />

          <input type="submit" value="送信" />
          <select name="pets" id="pet-select">
            <option value="">--1 つ選択してください--</option>
            <option value="dog">犬</option>
            <option value="cat">猫</option>
            <option value="hamster">ハムスター</option>
            <option value="parrot">オウム</option>
            <option value="spider">クモ</option>
            <option value="goldfish">金魚</option>
          </select>
          <select name="fruits" multiple>
            <option value="apple">りんご</option>
            <option value="banana">バナナ</option>
            <option value="orange">オレンジ</option>
            <option value="grape">ぶどう</option>
          </select>
        </form>
        <br /><br />
        <div style="display: flex; gap: 10px">
          <a href="./">ホームページに戻る</a><br /><br />
          <a href="./" class="btn" onclick="sendGoal()"
            >ホームページに戻る</a
          >
          <button onclick="location.href='page1_dammy.html';">
            ダミーへ
          </button>
        </div>
      </div>

        <p>このヘッダーはスクロールしても画面の上部に固定されます。</p>
      </div><br />

    <script>
      const loadMeasurementStart = performance.now();

      window.addEventListener("load", function () {
        document.body.classList.add("is-loaded");
        console.log("load event fired");
        console.log(
          "time to load event:",
          (performance.now() - loadMeasurementStart).toFixed(2) + "ms"
        );
      });

      // フォーム送信時にカスタムゴールを送信
      document.querySelector("form").addEventListener("submit", function (e) {
        e.preventDefault(); // ページ遷移を止める（重要）<-なんで？あんまわからんしそもそもページ遷移せん気がする
        alert("送信されました！");
        sitest.achieve_for({ gid: 83744, sid: 106865 }); // カスタムゴール
      });

      // ボタンクリック時にカスタムゴールを送信
